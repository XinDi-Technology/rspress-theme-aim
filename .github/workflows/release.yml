name: Automatic Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Extract version from tag
        id: extract_version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Get release notes from CHANGELOG.md
        id: get_release_notes
        run: |
          # Extract release notes from CHANGELOG.md
          VERSION=${{ steps.extract_version.outputs.version }}
          # Remove v prefix from version
          VERSION_WITHOUT_V=${VERSION#v}
          # Extract content from version header until next version header, including version links
          NOTES=$(awk -v ver="$VERSION_WITHOUT_V" 'BEGIN { flag=0; link_found=0 } /^## \[/ { if (flag && !link_found) { } else if (flag) { exit } else if ($0 ~ "\\[" ver "\\]") { flag=1 } next } flag { print; if ($0 ~ "^\[" ver "\]:") { link_found=1 } }' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Automated release for $VERSION"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v6
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
          NOTES: ${{ steps.get_release_notes.outputs.notes }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const version = process.env.VERSION;
            const notes = process.env.NOTES;
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: version,
              body: notes,
              draft: false,
              prerelease: false
            });

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install

      - name: Build with Rspress
        run: pnpm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
